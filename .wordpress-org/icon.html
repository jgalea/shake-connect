<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:256px;height:256px;overflow:hidden}
  .frame{position:relative;width:256px;height:256px;background:#08080a;overflow:hidden}
  .aurora{position:absolute;left:-40px;top:-60px;width:280px;height:240px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(217,70,239,.45),rgba(168,85,247,.24) 55%,rgba(96,165,250,.14) 80%,transparent);filter:blur(34px)}
  .aurora2{position:absolute;right:-60px;bottom:-70px;width:240px;height:220px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(96,165,250,.24),transparent 70%);filter:blur(38px)}
  svg{position:absolute;inset:0}
</style></head>
<body><div class="frame">
  <div class="aurora"></div><div class="aurora2"></div>
  <svg width="256" height="256" viewBox="0 0 256 256" fill="none">
    <defs><linearGradient id="w" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d946ef"/><stop offset=".55" stop-color="#f0abfc"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <path d="M40 128 L74 128 L96 70 L124 190 L150 58 L176 156 L192 128 L216 128"
      stroke="url(#w)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </svg>
</div></body></html>
